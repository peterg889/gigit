name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gigit
          POSTGRES_PASSWORD: gigit
          POSTGRES_DB: gigit
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U gigit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://gigit:gigit@localhost:5433/gigit
      SESSION_SECRET: ci-session-secret-0123456789abcdef0123456789
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @gigit/web build

  # ── Deploy (engineering-spec §3: staging on merge → manual prod promote) ──
  # Requires repo config: AWS_DEPLOY_ROLE_ARN (OIDC role), AWS_REGION,
  # and DEPLOY_ENABLED=true; PROD_DEPLOY_ENABLED plus a "production"
  # environment with required reviewers gates the optional production job.
  # Opt-in: set repo variable DEPLOY_ENABLED=true once AWS is wired up. Until
  # then this job is SKIPPED (not failed) so CI reflects code health, not the
  # absence of cloud credentials. (secrets aren't allowed in job-level `if`,
  # so a `vars` flag is the gate.)
  deploy-staging:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC into AWS — no long-lived keys (K11)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push images
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          docker build --platform linux/amd64 -f Dockerfile.web -t $REG/gigit-web-staging:${{ github.sha }} .
          docker build --platform linux/amd64 -f Dockerfile.worker -t $REG/gigit-worker-staging:${{ github.sha }} .
          docker push $REG/gigit-web-staging:${{ github.sha }}
          docker push $REG/gigit-worker-staging:${{ github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Roll out stack, private migrations, and services
        env:
          CDK_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          CFN_EXEC_ROLE=$(aws cloudformation describe-stacks --stack-name GigitBootstrap-staging --query "Stacks[0].Outputs[?OutputKey=='CloudFormationExecutionRoleArn'].OutputValue" --output text)
          test -n "$CFN_EXEC_ROLE" && test "$CFN_EXEC_ROLE" != "None"
          pnpm --filter @gigit/infra exec cdk deploy GigitStaging \
            --require-approval never \
            --role-arn "$CFN_EXEC_ROLE" \
            --context imageTag=${{ github.sha }} \
            --context deploymentNonce=${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Verify staging health
        run: |
          WEB_URL=$(aws cloudformation describe-stacks --stack-name GigitStaging --query "Stacks[0].Outputs[?OutputKey=='WebUrl'].OutputValue" --output text)
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            if curl -fsS --connect-timeout 5 --max-time 15 "$WEB_URL/api/health" >/dev/null && \
               curl -fsS --connect-timeout 5 --max-time 15 "$WEB_URL/slots" >/dev/null; then
              echo "staging healthy: $WEB_URL"
              exit 0
            fi
            sleep 10
          done
          echo "staging failed health checks" >&2
          exit 1

  promote-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && vars.PROD_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production # required-reviewer gate = the manual promote
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push production images
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          for app in web worker; do
            docker build --platform linux/amd64 -f Dockerfile.$app \
              -t $REG/gigit-$app-prod:${{ github.sha }} .
            docker push $REG/gigit-$app-prod:${{ github.sha }}
          done
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate and roll out production
        env:
          CDK_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          CFN_EXEC_ROLE=$(aws cloudformation describe-stacks --stack-name GigitBootstrap-prod --query "Stacks[0].Outputs[?OutputKey=='CloudFormationExecutionRoleArn'].OutputValue" --output text)
          test -n "$CFN_EXEC_ROLE" && test "$CFN_EXEC_ROLE" != "None"
          pnpm --filter @gigit/infra exec cdk deploy GigitProd \
            --require-approval never \
            --role-arn "$CFN_EXEC_ROLE" \
            --context imageTag=${{ github.sha }} \
            --context deploymentNonce=${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Verify production health
        run: |
          WEB_URL=$(aws cloudformation describe-stacks --stack-name GigitProd --query "Stacks[0].Outputs[?OutputKey=='WebUrl'].OutputValue" --output text)
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            if curl -fsS --connect-timeout 5 --max-time 15 "$WEB_URL/api/health" >/dev/null && \
               curl -fsS --connect-timeout 5 --max-time 15 "$WEB_URL/slots" >/dev/null; then
              echo "production healthy: $WEB_URL"
              exit 0
            fi
            sleep 10
          done
          echo "production failed health checks" >&2
          exit 1

  e2e:
    needs: build-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gigit
          POSTGRES_PASSWORD: gigit
          POSTGRES_DB: gigit
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U gigit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://gigit:gigit@localhost:5433/gigit
      SESSION_SECRET: ci-session-secret-0123456789abcdef0123456789
      APP_URL: http://localhost:3002
      E2E_BASE_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm db:migrate && pnpm db:seed
      - run: npx playwright install --with-deps chromium
      - name: Start the stack
        run: |
          (pnpm --filter @gigit/web dev &) && (pnpm --filter @gigit/worker dev &)
          npx wait-on http://localhost:3002 --timeout 120000
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
