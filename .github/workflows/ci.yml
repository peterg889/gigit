name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gigit
          POSTGRES_PASSWORD: gigit
          POSTGRES_DB: gigit
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U gigit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://gigit:gigit@localhost:5433/gigit
      SESSION_SECRET: ci-session-secret-0123456789abcdef0123456789
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @gigit/web build

  # ── Deploy (engineering-spec §3: staging on merge → manual prod promote) ──
  # Requires repo config: AWS_DEPLOY_ROLE_ARN (OIDC role), AWS_REGION,
  # STAGING_DATABASE_URL secrets; a "production" environment with required
  # reviewers gates the promote job.
  # Opt-in: set repo variable DEPLOY_ENABLED=true once AWS is wired up. Until
  # then this job is SKIPPED (not failed) so CI reflects code health, not the
  # absence of cloud credentials. (secrets aren't allowed in job-level `if`,
  # so a `vars` flag is the gate.)
  deploy-staging:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC into AWS — no long-lived keys (K11)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push images
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          docker build -f Dockerfile.web -t $REG/gigit-web-staging:latest -t $REG/gigit-web-staging:${{ github.sha }} .
          docker build -f Dockerfile.worker -t $REG/gigit-worker-staging:latest -t $REG/gigit-worker-staging:${{ github.sha }} .
          docker push --all-tags $REG/gigit-web-staging
          docker push --all-tags $REG/gigit-worker-staging
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run migrations against staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm db:migrate
      # web: App Runner auto-deploys on the :latest push (K11).
      - name: Redeploy worker via SSM
        run: |
          IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:cloudformation:stack-name,Values=GigitStaging" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          [ -z "$IDS" ] && { echo "no worker instance found"; exit 1; }
          # run-worker.sh (written by the instance userData) re-pulls and restarts
          # the container with env materialized from AppSecrets + the computed vars.
          aws ssm send-command --instance-ids $IDS --document-name AWS-RunShellScript \
            --parameters 'commands=["bash /usr/local/bin/run-worker.sh"]'

  promote-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # required-reviewer gate = the manual promote
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Retag staging images for production
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          for app in web worker; do
            docker pull $REG/gigit-$app-staging:${{ github.sha }}
            docker tag $REG/gigit-$app-staging:${{ github.sha }} $REG/gigit-$app-prod:latest
            docker push $REG/gigit-$app-prod:latest
          done

  e2e:
    needs: build-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gigit
          POSTGRES_PASSWORD: gigit
          POSTGRES_DB: gigit
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U gigit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://gigit:gigit@localhost:5433/gigit
      SESSION_SECRET: ci-session-secret-0123456789abcdef0123456789
      APP_URL: http://localhost:3002
      E2E_BASE_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm db:migrate && pnpm db:seed
      - run: npx playwright install --with-deps chromium
      - name: Start the stack
        run: |
          (pnpm --filter @gigit/web dev &) && (pnpm --filter @gigit/worker dev &)
          npx wait-on http://localhost:3002 --timeout 120000
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
